<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブロウラー一覧</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">BRAWL FAN SITE</div>
    <nav class="nav">
      <a href="index.html">ホーム</a>
      <a href="brawlers.html">ブロウラー</a>
      <a href="tierlist.html">Tier表</a>
      <a href="maps.html">マップ</a>
      <a href="player.html">プレイヤー検索</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="section">
      <div class="section-title-row">
        <h1 class="section-title">ブロウラー一覧</h1>
      </div>

      <div class="filters">
        <input id="searchInput" class="input" type="text" placeholder="ブロウラー名で検索" />
        <select id="roleFilter" class="input">
          <option value="all">すべてのロール</option>
          <option value="damage">アタッカー</option>
          <option value="tank">タンク</option>
          <option value="support">サポート</option>
          <option value="control">コントロール</option>
        </select>
        <select id="tierFilter" class="input">
          <option value="all">すべてのTier</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </div>

      <div id="brawlerGrid" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Fan-made site</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
