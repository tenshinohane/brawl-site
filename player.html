<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プレイヤー検索</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">BRAWL FAN SITE</div>
    <nav class="nav">
      <a href="index.html">ホーム</a>
      <a href="brawlers.html">ブロウラー</a>
      <a href="tierlist.html">Tier表</a>
      <a href="maps.html">マップ</a>
      <a href="player.html">プレイヤー検索</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="section">
      <div class="section-title-row">
        <h1 class="section-title">プレイヤー検索</h1>
      </div>

      <div class="player-search-box">
        <input id="playerTag" class="input player-input" type="text" placeholder="#XXXXXXX" />
        <button id="searchBtn" class="btn primary">検索</button>
      </div>

      <p class="helper-text">
        プレイヤータグを入力して検索します。ログインは不要です。
      </p>

      <div id="status" class="status-box"></div>

      <div id="playerResult" class="player-result"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Fan-made site</p>
  </footer>

  <script src="player.js"></script>
</body>
</html>
